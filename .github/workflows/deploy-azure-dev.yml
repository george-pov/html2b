name: Deploy Azure dev

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      operation:
        description: Select the no-mutation Azure operation.
        required: true
        type: choice
        options:
          - what-if

permissions:
  contents: read

concurrency:
  group: html2b-dev
  cancel-in-progress: false

jobs:
  validate:
    name: Validate deployment source
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}

    steps:
      - name: Check out selected commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Resolve selected main commit
        id: source
        shell: pwsh
        run: |
          if ('${{ github.ref }}' -cne 'refs/heads/main') {
            throw 'Azure dev preview is restricted to the main branch.'
          }
          $head = (git rev-parse HEAD).Trim()
          if ($head -cnotmatch '^[0-9a-f]{40}$' -or $head -cne '${{ github.sha }}') {
            throw 'The checked-out full SHA does not match github.sha.'
          }
          if (-not [string]::IsNullOrWhiteSpace((git status --porcelain --untracked-files=all | Out-String).Trim())) {
            throw 'Azure dev preview requires a clean selected commit.'
          }
          "source_sha=$head" >> $env:GITHUB_OUTPUT

      - name: Restore and build solution
        run: |
          dotnet restore src/api/Html2b.slnx
          dotnet build src/api/Html2b.slnx --configuration Release --no-restore
          dotnet format src/api/Html2b.slnx --verify-no-changes --no-restore

      - name: Compile Bicep and parameters
        shell: pwsh
        run: |
          az bicep install --version v0.45.6
          $output = 'build/deployment/004/${{ github.sha }}/validate'
          New-Item -ItemType Directory -Force -Path $output | Out-Null
          az bicep build --file bicep/main.bicep --outfile "$output/main.json"
          if ($LASTEXITCODE -ne 0) { throw 'Bicep compilation failed.' }
          az bicep build-params --file bicep/environments/dev.bicepparam --outfile "$output/dev.parameters.json"
          if ($LASTEXITCODE -ne 0) { throw 'Bicep parameter compilation failed.' }

      - name: Parse PowerShell
        shell: pwsh
        run: |
          foreach ($file in Get-ChildItem scripts/azure -Filter '*.ps1' -File) {
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$null,
              [ref]$errors)
            if ($errors.Count -gt 0) {
              throw "$($file.Name): $($errors -join '; ')"
            }
          }

      - name: Install verified actionlint
        shell: bash
        run: |
          set -euo pipefail
          directory="$RUNNER_TEMP/actionlint"
          archive="$directory/actionlint.tar.gz"
          mkdir -p "$directory"
          curl --fail --silent --show-error --location \
            --output "$archive" \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  $archive" |
            sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$directory" actionlint
          "$directory/actionlint" .github/workflows/*.yml

      - name: Check repository diff
        run: git diff --check

  preview:
    name: Preview Azure changes
    needs:
      - validate
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: dev
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Check out validated commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate.outputs.source_sha }}
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Reconfirm selected source
        shell: pwsh
        run: |
          $head = (git rev-parse HEAD).Trim()
          if ($head -cne '${{ needs.validate.outputs.source_sha }}' -or
              $head -cne '${{ github.sha }}' -or
              $head -cnotmatch '^[0-9a-f]{40}$') {
            throw 'Source SHA changed between validate and preview jobs.'
          }
          if (-not [string]::IsNullOrWhiteSpace((git status --porcelain --untracked-files=all | Out-String).Trim())) {
            throw 'Preview source is not clean.'
          }

      - name: Build release artifacts
        shell: pwsh
        run: |
          $renderValues = @{}
          & ./scripts/azure/Publish-Html2bImage.ps1 -SourceCommit '${{ needs.validate.outputs.source_sha }}' |
            ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                $renderValues[$matches[1]] = $matches[2]
              }
            }
          $functionValues = @{}
          & ./scripts/azure/Publish-Html2bFunctions.ps1 -SourceCommit '${{ needs.validate.outputs.source_sha }}' |
            ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                $functionValues[$matches[1]] = $matches[2]
              }
            }
          foreach ($required in @('renderImageTag', 'renderManifestDigest', 'renderImage', 'renderOciLayoutPath')) {
            if (-not $renderValues.ContainsKey($required)) { throw "Render output omitted $required." }
          }
          foreach ($required in @('functionPackagePath', 'functionPackageSha256')) {
            if (-not $functionValues.ContainsKey($required)) { throw "Functions output omitted $required." }
          }
          "RENDER_IMAGE_TAG=$($renderValues.renderImageTag)" >> $env:GITHUB_ENV
          "RENDER_DIGEST=$($renderValues.renderManifestDigest)" >> $env:GITHUB_ENV
          "RENDER_IMAGE=$($renderValues.renderImage)" >> $env:GITHUB_ENV
          "RENDER_OCI_LAYOUT=$($renderValues.renderOciLayoutPath)" >> $env:GITHUB_ENV
          "FUNCTION_PACKAGE_PATH=$($functionValues.functionPackagePath)" >> $env:GITHUB_ENV
          "FUNCTION_PACKAGE_SHA256=$($functionValues.functionPackageSha256)" >> $env:GITHUB_ENV

      - name: Authenticate infrastructure preview
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_INFRA_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run complete Azure what-if
        shell: pwsh
        run: |
          az bicep install --version v0.45.6
          $values = @{}
          & ./scripts/azure/Deploy-AzureDev.ps1 `
            -Operation WhatIf `
            -SourceCommit '${{ needs.validate.outputs.source_sha }}' `
            -RenderImage $env:RENDER_IMAGE |
            ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                $values[$matches[1]] = $matches[2]
              }
            }
          foreach ($required in @('sanitizedWhatIfPath', 'compiledTemplatePath', 'compiledParametersPath', 'validationEvidencePath')) {
            if (-not $values.ContainsKey($required)) { throw "Azure preview omitted $required." }
          }
          "SANITIZED_WHAT_IF_PATH=$($values.sanitizedWhatIfPath)" >> $env:GITHUB_ENV
          "BICEP_PATH=$($values.compiledTemplatePath)" >> $env:GITHUB_ENV
          "PARAMETERS_PATH=$($values.compiledParametersPath)" >> $env:GITHUB_ENV
          "AZURE_VALIDATION_PATH=$($values.validationEvidencePath)" >> $env:GITHUB_ENV

      - name: Validate preview state
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $values = @{}
          & ./scripts/azure/Test-AzureDev.ps1 `
            -ValidationMode Preview `
            -SanitizedWhatIfPath $env:SANITIZED_WHAT_IF_PATH |
            ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                $values[$matches[1]] = $matches[2]
              }
            }
          if (-not $values.ContainsKey('previewValidationEvidencePath')) {
            throw 'Preview validation omitted sanitized evidence.'
          }
          "PREVIEW_VALIDATION_PATH=$($values.previewValidationEvidencePath)" >> $env:GITHUB_ENV

      - name: Write preview manifest
        shell: pwsh
        run: |
          $values = @{}
          & ./scripts/azure/Write-AzureDevManifest.ps1 `
            -Mode Preview `
            -SourceCommit '${{ needs.validate.outputs.source_sha }}' `
            -FunctionPackagePath $env:FUNCTION_PACKAGE_PATH `
            -RenderCommitTag $env:RENDER_IMAGE_TAG `
            -RenderDigest $env:RENDER_DIGEST `
            -BicepPath $env:BICEP_PATH `
            -ParametersPath $env:PARAMETERS_PATH `
            -WorkflowRunId '${{ github.run_id }}' `
            -WorkflowRunAttempt '${{ github.run_attempt }}' `
            -ValidationResult @(
              'Repository=Passed',
              'AzureValidation=Passed',
              'AzureWhatIf=Passed',
              'PreviewState=Passed'
            ) |
            ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                $values[$matches[1]] = $matches[2]
              }
            }
          if (-not $values.ContainsKey('manifestPath')) {
            throw 'Manifest writer omitted manifestPath.'
          }
          "MANIFEST_PATH=$($values.manifestPath)" >> $env:GITHUB_ENV

      - name: Publish sanitized preview summary
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw $env:MANIFEST_PATH | ConvertFrom-Json
          $whatIf = Get-Content -Raw $env:SANITIZED_WHAT_IF_PATH | ConvertFrom-Json
          @"
          ## Azure dev preview

          - Source: `$($manifest.source.commit)`
          - Function package: `$($manifest.artifacts.functionPackageSha256)`
          - Render digest: `$($manifest.artifacts.renderDigest)`
          - Safe changes: `$(@($whatIf.changes).Count)`
          - Apply performed: no
          - ACR push performed: no
          - Function deployment performed: no
          "@ >> $env:GITHUB_STEP_SUMMARY

      - name: Upload sanitized preview evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: azure-dev-preview-${{ github.run_id }}
          path: |
            ${{ env.MANIFEST_PATH }}
            ${{ env.SANITIZED_WHAT_IF_PATH }}
            ${{ env.AZURE_VALIDATION_PATH }}
            ${{ env.PREVIEW_VALIDATION_PATH }}
          if-no-files-found: error
          retention-days: 30
