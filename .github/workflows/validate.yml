name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Repository validation
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out selected commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Verify selected source
        shell: pwsh
        run: |
          $head = (git rev-parse HEAD).Trim()
          if ($head -cnotmatch '^[0-9a-f]{40}$' -or $head -cne '${{ github.sha }}') {
            throw 'The checked-out source does not match github.sha.'
          }
          if (-not [string]::IsNullOrWhiteSpace((git status --porcelain --untracked-files=all | Out-String).Trim())) {
            throw 'Repository validation requires a clean selected commit.'
          }

      - name: Restore solution
        run: dotnet restore src/api/Html2b.slnx

      - name: Build solution
        run: dotnet build src/api/Html2b.slnx --configuration Release --no-restore

      - name: Verify formatting
        run: dotnet format src/api/Html2b.slnx --verify-no-changes --no-restore

      - name: Build and validate Render artifacts
        shell: pwsh
        run: |
          $values = @{}
          & ./scripts/azure/Publish-Html2bImage.ps1 -SourceCommit '${{ github.sha }}' |
            ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                $values[$matches[1]] = $matches[2]
              }
            }
          foreach ($required in @('renderImageTag', 'renderManifestDigest', 'renderImage', 'renderMetadataPath')) {
            if (-not $values.ContainsKey($required)) {
              throw "Render publisher omitted $required."
            }
          }
          "RENDER_IMAGE_TAG=$($values.renderImageTag)" >> $env:GITHUB_ENV
          "RENDER_DIGEST=$($values.renderManifestDigest)" >> $env:GITHUB_ENV
          "RENDER_IMAGE=$($values.renderImage)" >> $env:GITHUB_ENV
          "RENDER_METADATA_PATH=$($values.renderMetadataPath)" >> $env:GITHUB_ENV

      - name: Build and validate Functions package
        shell: pwsh
        run: |
          $values = @{}
          & ./scripts/azure/Publish-Html2bFunctions.ps1 -SourceCommit '${{ github.sha }}' |
            ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                $values[$matches[1]] = $matches[2]
              }
            }
          foreach ($required in @('functionPackagePath', 'functionPackageSha256', 'functionPackageMetadataPath')) {
            if (-not $values.ContainsKey($required)) {
              throw "Functions publisher omitted $required."
            }
          }
          "FUNCTION_PACKAGE_PATH=$($values.functionPackagePath)" >> $env:GITHUB_ENV
          "FUNCTION_PACKAGE_SHA256=$($values.functionPackageSha256)" >> $env:GITHUB_ENV
          "FUNCTION_METADATA_PATH=$($values.functionPackageMetadataPath)" >> $env:GITHUB_ENV

      - name: Compile Bicep and parameters
        shell: pwsh
        run: |
          az bicep install --version v0.45.6
          $output = 'build/deployment/004/${{ github.sha }}/bicep'
          New-Item -ItemType Directory -Force -Path $output | Out-Null
          az bicep build --file bicep/main.bicep --outfile "$output/main.json"
          if ($LASTEXITCODE -ne 0) { throw 'Bicep compilation failed.' }
          az bicep build-params --file bicep/environments/dev.bicepparam --outfile "$output/dev.parameters.json"
          if ($LASTEXITCODE -ne 0) { throw 'Bicep parameter compilation failed.' }
          "BICEP_PATH=$output/main.json" >> $env:GITHUB_ENV
          "PARAMETERS_PATH=$output/dev.parameters.json" >> $env:GITHUB_ENV

      - name: Parse PowerShell
        shell: pwsh
        run: |
          $failures = @()
          foreach ($file in Get-ChildItem scripts/azure -Filter '*.ps1' -File) {
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$null,
              [ref]$errors)
            if ($errors.Count -gt 0) {
              $failures += "$($file.Name): $($errors -join '; ')"
            }
          }
          if ($failures.Count -gt 0) {
            throw ($failures -join [Environment]::NewLine)
          }

      - name: Install verified actionlint
        shell: bash
        run: |
          set -euo pipefail
          directory="$RUNNER_TEMP/actionlint"
          archive="$directory/actionlint.tar.gz"
          mkdir -p "$directory"
          curl --fail --silent --show-error --location \
            --output "$archive" \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  $archive" |
            sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$directory" actionlint
          echo "$directory" >> "$GITHUB_PATH"

      - name: Validate workflows
        run: actionlint .github/workflows/*.yml

      - name: Scan tracked and generated text for secrets
        shell: pwsh
        run: |
          $trackedPatternParts = @(
            ('DefaultEndpointsProtocol' + '='),
            ('AccountKey' + '=[A-Za-z0-9+/=]{16,}'),
            ('SharedAccessSignature' + '=[A-Za-z0-9%&=]{16,}'),
            ('ghp_' + '[A-Za-z0-9]{20,}'),
            ('-----BEGIN ' + '[A-Z ]+PRIVATE KEY-----')
          )
          $trackedPattern = '(' + ($trackedPatternParts -join '|') + ')'
          $matches = @(git grep -n -I -E $trackedPattern -- ':!scripts/azure/Test-AzureDevManifest.ps1')
          $grepExitCode = $LASTEXITCODE
          if ($grepExitCode -notin @(0, 1)) {
            throw 'Tracked-source secret scan failed to run.'
          }
          if ($matches.Count -gt 0) {
            throw 'Tracked-source secret scan found a forbidden value.'
          }
          $global:LASTEXITCODE = 0
          $generatedPatternParts = @(
            ('AccountKey' + '='),
            ('SharedAccessSignature' + '='),
            ('InstrumentationKey' + '='),
            ('Authorization:' + '\s*Bearer'),
            ('ghp_' + '[A-Za-z0-9]{20,}'),
            ('-----BEGIN ' + '[A-Z ]+PRIVATE KEY-----')
          )
          $generatedPattern = '(' + ($generatedPatternParts -join '|') + ')'
          $generatedFiles = Get-ChildItem build/deployment/004 -Recurse -File |
            Where-Object Extension -in @('.json', '.txt', '.md')
          if ($null -ne ($generatedFiles | Select-String -Pattern $generatedPattern | Select-Object -First 1)) {
            throw 'Generated-artifact secret scan found a forbidden value.'
          }

      - name: Check repository diff
        shell: pwsh
        run: |
          git diff --check
          if (-not [string]::IsNullOrWhiteSpace((git status --porcelain --untracked-files=all | Out-String).Trim())) {
            throw 'Validation changed tracked or untracked repository source.'
          }

      - name: Prepare sanitized validation evidence
        shell: pwsh
        run: |
          $render = Get-Content -Raw $env:RENDER_METADATA_PATH | ConvertFrom-Json
          $functions = Get-Content -Raw $env:FUNCTION_METADATA_PATH | ConvertFrom-Json
          $evidence = [ordered]@{
            schema = 'Html2bRepositoryValidationV1'
            sourceCommit = '${{ github.sha }}'
            render = [ordered]@{
              commitTag = $render.commitTag
              manifestDigest = $render.manifestDigest
              configDigest = $render.configDigest
              layerCount = $render.layerCount
              platform = $render.platform
            }
            functions = [ordered]@{
              packageSha256 = $functions.packageSha256
              runtimeIdentifier = $functions.runtimeIdentifier
              readyToRun = $functions.readyToRun
            }
            checks = @(
              'restore',
              'build',
              'format',
              'render-contract',
              'functions-package',
              'bicep',
              'powershell-parse',
              'actionlint',
              'secret-scan',
              'diff-check'
            )
          }
          $directory = 'build/validation/004/p01/repository'
          New-Item -ItemType Directory -Force -Path $directory | Out-Null
          $evidence | ConvertTo-Json -Depth 10 |
            Set-Content -LiteralPath "$directory/repository-validation.json" -Encoding utf8NoBOM
          @"
          ## Repository validation

          - Source: `${{ github.sha }}`
          - Render: `$($render.manifestDigest)`
          - Functions package: `$($functions.packageSha256)`
          - Result: passed
          "@ >> $env:GITHUB_STEP_SUMMARY

      - name: Upload sanitized validation evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repository-validation-${{ github.run_id }}
          path: build/validation/004/p01/repository/repository-validation.json
          if-no-files-found: error
          retention-days: 14
